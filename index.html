<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic-Tac-Toe | Nnnekita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">TIC-TAC-TOE</h1>
        <div class="status" id="status">Ход: X</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="reset-btn" id="resetBtn">Начать заново</button>
        <div class="score-board">
            <div class="score score-x">
                <span class="score-label">X</span>
                <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score score-draw">
                <span class="score-label">Ничья</span>
                <span class="score-value" id="scoreDraw">0</span>
            </div>
            <div class="score score-o">
                <span class="score-label">O</span>
                <span class="score-value" id="scoreO">0</span>
            </div>
        </div>
        <div class="creator">Created by Nnnekita</div>
    </div>
    <audio id="moveSound" src="sounds/laser_sword_strike_sword_03.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
